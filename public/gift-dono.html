<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTS Everything Gifts & Donos</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/desktop.css" />
    <script src="/gift-dono.js" defer></script>
  </head>
  <body class="gift-dono-popout">
    <header class="chat-popout-header">
      <div>
        <span>Gifts and donos</span>
        <strong id="popoutGiftDonoCount">0 events</strong>
      </div>
      <button id="pinGiftDonoWindowButton" class="ghost-button" type="button" aria-pressed="false">Pin</button>
    </header>
    <main class="gift-dono-shell popout-gift-dono-shell">
      <ol id="popoutGiftDonoList" class="gift-dono-list" aria-live="polite">
        <li class="gift-dono-empty">Open the main app and connect Streamer.bot.</li>
      </ol>
    </main>
  </body>
</html>
