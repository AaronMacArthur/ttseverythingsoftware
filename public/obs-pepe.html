<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTS Everything OBS Pepe Source</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
      }

      .avatar-stage {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: transparent;
      }

      .avatar-stage img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        opacity: 0;
        transition: opacity 45ms linear;
      }

      .avatar-stage .closed {
        opacity: 1;
      }

      body.is-speaking .avatar-stage .closed {
        opacity: 0;
      }

      body.is-speaking .avatar-stage .open {
        opacity: 1;
      }

      .debug {
        position: fixed;
        left: 8px;
        bottom: 8px;
        padding: 5px 7px;
        color: #ffffff;
        background: rgba(0, 0, 0, 0.62);
        font: 12px/1.3 "Segoe UI", system-ui, sans-serif;
      }

      .debug[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="avatar-stage" aria-hidden="true">
      <img class="closed" src="/obs-pepe-closed.png" alt="" />
      <img class="open" src="/obs-pepe-open.png" alt="" />
    </main>
    <div id="debug" class="debug" hidden>Closed</div>
    <script src="/obs-pepe.js" defer></script>
  </body>
</html>
